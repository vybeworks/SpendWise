<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="theme-color" content="#F4F1EA" media="(prefers-color-scheme: light)"/>
<meta name="theme-color" content="#141210" media="(prefers-color-scheme: dark)"/>
<title>SpendWise — Daily spending decisions</title>
<meta name="description" content="A daily financial advisor that sometimes tells you not to spend anything."/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,ital,wght@9..144,0,300;9..144,0,400;9..144,0,500;9..144,0,600;9..144,1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<!-- Supabase JS SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ── design tokens ── */
:root,[data-theme="light"]{
  --bg:#F4F1EA;--bg-grain:rgba(0,0,0,0.015);
  --card:#FBF9F4;--card-elev:#FFFFFF;
  --ink:#1A1A1A;--ink-soft:#2C2A28;--muted:#6B6660;
  --line:#E5E0D6;--line-soft:#EFEAE0;
  --accent:#C2410C;--accent-soft:rgba(194,65,12,0.08);--accent-mid:rgba(194,65,12,0.18);
  --green:#3F6B3A;--green-soft:rgba(63,107,58,0.1);
  --red:#A03030;--red-soft:rgba(160,48,48,0.1);
  --amber:#B57614;--gold:#B8860B;
  --shadow-lg:0 8px 28px rgba(0,0,0,0.09),0 2px 6px rgba(0,0,0,0.04);
}
[data-theme="dark"]{
  --bg:#141210;--bg-grain:rgba(255,255,255,0.012);
  --card:#1E1B18;--card-elev:#252220;
  --ink:#F2EEE6;--ink-soft:#E0DCD3;--muted:#8F8A82;
  --line:#2E2A26;--line-soft:#232020;
  --accent:#E8825A;--accent-soft:rgba(232,130,90,0.12);--accent-mid:rgba(232,130,90,0.22);
  --green:#7BA876;--green-soft:rgba(123,168,118,0.12);
  --red:#D87575;--red-soft:rgba(216,117,117,0.12);
  --amber:#D4A24A;--gold:#E8C160;
  --shadow-lg:0 8px 28px rgba(0,0,0,0.42),0 2px 6px rgba(0,0,0,0.22);
}
[data-theme="light"] .pm-card.active{background:linear-gradient(135deg,#2C2520 0%,#3D2B1F 100%);color:#F4F1EA;border-color:var(--gold);}
[data-theme="dark"]  .pm-card.active{background:linear-gradient(135deg,#2a1f17 0%,#1a1a1a 100%);color:#F2EEE6;border-color:var(--gold);}
:root{
  --fd:'Fraunces','Cormorant Garamond',Georgia,serif;
  --fb:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  --ease:cubic-bezier(0.4,0,0.2,1);
  --eout:cubic-bezier(0.16,1,0.3,1);
}
/* ── reset ── */
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{background:var(--bg);font-family:var(--fb);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased;transition:background .4s var(--ease),color .4s var(--ease);background-image:radial-gradient(circle at 1px 1px,var(--bg-grain) 1px,transparent 0);background-size:24px 24px;}
#app{max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:52px;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;padding:0;}
input,textarea{font-family:inherit;outline:none;color:inherit;}
input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
input[type=number]{-moz-appearance:textfield;}
textarea{resize:none;}
/* ── animations ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.06)}100%{transform:scale(1)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes spin{to{transform:rotate(360deg)}}
.screen{padding:24px 28px 40px;animation:fadeUp .38s var(--eout);}
.screen-ob{padding:60px 28px 40px;}
.screen-auth{padding:60px 28px 40px;}
.stagger>*{opacity:0;animation:fadeUp .5s var(--eout) forwards;}
.stagger>*:nth-child(1){animation-delay:.05s}.stagger>*:nth-child(2){animation-delay:.12s}
.stagger>*:nth-child(3){animation-delay:.19s}.stagger>*:nth-child(4){animation-delay:.26s}
.stagger>*:nth-child(5){animation-delay:.33s}.stagger>*:nth-child(6){animation-delay:.40s}
.stagger>*:nth-child(7){animation-delay:.47s}.stagger>*:nth-child(8){animation-delay:.54s}
/* ── brand ── */
.brand-wrap{display:flex;align-items:center;gap:8px;}
.brand-mark{width:22px;height:22px;border-radius:50%;background:var(--accent);position:relative;flex-shrink:0;}
.brand-mark::after{content:'';position:absolute;inset:5px;border-radius:50%;background:var(--bg);}
.brand{font-family:var(--fd);font-size:13px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);font-weight:500;}
/* ── layout chrome ── */
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:44px;}
.top-bar-r{display:flex;gap:4px;align-items:center;}
.icon-btn{color:var(--muted);padding:8px;display:inline-flex;align-items:center;justify-content:center;border-radius:8px;transition:color .2s,background .2s;}
.icon-btn:hover{color:var(--ink);background:var(--card);}
.sub-header{display:flex;align-items:center;gap:12px;}
.sub-header h2{font-family:var(--fd);font-size:24px;font-weight:400;letter-spacing:-.015em;margin:0;}
/* ── auth screen ── */
.auth-eyebrow{font-family:var(--fd);font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);margin-bottom:12px;}
.auth-title{font-family:var(--fd);font-weight:400;font-size:38px;line-height:1.06;margin:0 0 10px;letter-spacing:-.025em;}
.auth-title em{font-style:italic;color:var(--accent);}
.auth-sub{color:var(--muted);font-size:15px;line-height:1.5;margin:0 0 32px;}
.auth-tabs{display:flex;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:4px;gap:4px;margin-bottom:28px;}
.auth-tab{flex:1;padding:10px;border-radius:9px;font-size:14px;font-weight:500;color:var(--muted);text-align:center;transition:all .2s;}
.auth-tab.active{background:var(--ink);color:var(--bg);}
.auth-error{background:var(--red-soft);border:1px solid var(--red);border-radius:10px;padding:12px 14px;font-size:13px;color:var(--red);margin-bottom:16px;line-height:1.4;}
.auth-success{background:var(--green-soft);border:1px solid var(--green);border-radius:10px;padding:12px 14px;font-size:13px;color:var(--green);margin-bottom:16px;line-height:1.4;}
.auth-divider{text-align:center;font-size:12px;color:var(--muted);margin:16px 0;}
.auth-link{color:var(--accent);font-size:13px;text-decoration:underline;text-underline-offset:3px;cursor:pointer;background:none;border:none;font-family:inherit;}
/* ── sync indicator ── */
.sync-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.sync-dot.synced{background:var(--green);}
.sync-dot.syncing{background:var(--amber);animation:pulse 1s ease-in-out infinite;}
.sync-dot.offline{background:var(--muted);}
.sync-dot.error{background:var(--red);}
.sync-row{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);letter-spacing:.03em;}
/* ── spinner ── */
.spinner{width:16px;height:16px;border:2px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}
/* ── hero ── */
.hero{text-align:center;margin-bottom:28px;}
.hero-eyebrow{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin-bottom:14px;font-weight:500;}
.hero-amount{font-family:var(--fd);font-weight:300;font-size:88px;line-height:1;letter-spacing:-.045em;margin-bottom:14px;color:var(--ink);font-feature-settings:'lnum';}
.hero-amount.zero{font-style:italic;font-weight:400;}
.hero-amount .cents{font-size:36px;color:var(--muted);margin-left:2px;font-weight:400;}
.status-pill{display:inline-flex;align-items:center;gap:8px;padding:7px 14px;border-radius:999px;background:var(--card);border:1px solid var(--line);font-size:12px;font-weight:500;}
.status-dot{width:6px;height:6px;border-radius:50%;}
.hero-sub{font-size:14px;color:var(--muted);margin-top:14px;line-height:1.5;max-width:300px;margin-left:auto;margin-right:auto;}
.hero-sub.zero{font-family:var(--fd);font-style:italic;font-size:17px;margin-top:18px;color:var(--ink-soft);}
/* ── velocity ── */
.vel-row{display:flex;align-items:center;justify-content:center;gap:7px;margin-top:10px;}
.vel-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.vel-txt{font-size:12px;color:var(--muted);}
/* ── progress bar ── */
.prog-wrap{margin-bottom:20px;}
.prog-labels{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:9px;}
.prog-labels .n{font-family:var(--fd);color:var(--ink);font-feature-settings:'lnum';}
.prog-bar{height:4px;background:var(--line);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;transition:width .6s var(--eout);border-radius:2px;}
.prog-meta{font-size:11px;color:var(--muted);margin-top:7px;letter-spacing:.04em;}
/* ── missed-day card ── */
.missed-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px 18px;margin-bottom:16px;display:flex;align-items:flex-start;gap:13px;}
.missed-icon{font-size:20px;flex-shrink:0;}
.missed-body{flex:1;}
.missed-title{font-size:14px;font-weight:600;margin-bottom:3px;}
.missed-sub{font-size:12px;color:var(--muted);line-height:1.4;}
.missed-actions{display:flex;gap:8px;margin-top:10px;}
.missed-btn-yes{padding:7px 14px;border-radius:8px;font-size:13px;font-weight:500;background:var(--ink);color:var(--bg);}
.missed-btn-no{padding:7px 14px;border-radius:8px;font-size:13px;color:var(--muted);border:1px solid var(--line);}
/* ── savings tracker ── */
.savings-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px 18px;margin-bottom:16px;display:flex;align-items:center;gap:13px;}
.savings-icon{font-size:20px;flex-shrink:0;}
.savings-body{flex:1;}
.savings-title{font-size:10px;font-weight:600;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px;}
.savings-bar{height:5px;background:var(--line);border-radius:3px;overflow:hidden;margin-bottom:5px;}
.savings-fill{height:100%;border-radius:3px;transition:width .6s var(--eout);}
.savings-meta .n{font-family:var(--fd);color:var(--ink);font-feature-settings:'lnum';}
.savings-meta{font-size:12px;color:var(--muted);}
/* ── projection card ── */
.proj-card{border-radius:14px;padding:16px 18px;margin-bottom:16px;border:1px solid var(--line);}
.proj-card.ok{background:var(--green-soft);border-color:var(--green);}
.proj-card.warn{background:var(--accent-soft);border-color:var(--accent-mid);}
.proj-card.over{background:var(--red-soft);border-color:var(--red);}
.proj-label{font-size:10px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;margin-bottom:5px;display:flex;align-items:center;gap:5px;}
.proj-label.ok{color:var(--green)}.proj-label.warn{color:var(--accent)}.proj-label.over{color:var(--red)}
.proj-amount{font-family:var(--fd);font-size:26px;font-weight:400;letter-spacing:-.02em;font-feature-settings:'lnum';margin-bottom:2px;}
.proj-sub{font-size:12px;color:var(--muted);line-height:1.4;}
.proj-detail{margin-top:10px;padding-top:10px;border-top:1px solid var(--line-soft);}
.proj-detail-row{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;}
.proj-detail-row .dc{color:var(--muted);}
.proj-detail-row .da{font-family:var(--fd);font-size:13px;}
.proj-detail-row .da.over{color:var(--red);}
/* ── nudge ── */
.nudge{background:var(--accent-soft);border:1px solid var(--accent-mid);border-radius:14px;padding:13px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:background .2s;}
.nudge:hover{background:var(--accent-mid);}
.nudge-icon{font-size:18px;flex-shrink:0;}
.nudge-body{flex:1;}
.nudge-title{font-size:13px;font-weight:600;color:var(--accent);margin-bottom:2px;}
.nudge-sub{font-size:12px;color:var(--muted);line-height:1.4;}
/* ── insight card ── */
.insight-card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px 22px;margin-bottom:16px;position:relative;overflow:hidden;}
.insight-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--accent);opacity:.55;}
.insight-lbl{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);margin-bottom:9px;font-weight:600;display:flex;align-items:center;gap:6px;}
.insight-txt{font-family:var(--fd);font-size:18px;line-height:1.4;font-weight:400;color:var(--ink);}
.insight-card.locked{cursor:pointer;}
.insight-card.locked .insight-txt{filter:blur(5px);user-select:none;pointer-events:none;}
.insight-overlay{position:absolute;inset:0;background:linear-gradient(180deg,transparent 0%,var(--card) 62%);display:flex;align-items:flex-end;justify-content:center;padding:16px;}
/* ── record card ── */
.record-card{background:linear-gradient(135deg,var(--card) 0%,var(--accent-soft) 100%);border:1px solid var(--accent-mid);border-radius:16px;padding:18px 20px;margin-bottom:16px;position:relative;overflow:hidden;}
.record-card::after{content:'★';position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:40px;opacity:.07;color:var(--gold);pointer-events:none;}
.record-eye{font-size:10px;letter-spacing:.2em;text-transform:uppercase;font-weight:700;color:var(--gold);margin-bottom:5px;}
.record-title{font-family:var(--fd);font-size:20px;font-weight:400;color:var(--ink);margin-bottom:2px;}
.record-sub{font-size:12px;color:var(--muted);}
/* ── month comparison ── */
.compare-card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px 20px;margin-bottom:16px;}
.compare-lbl{font-size:10px;letter-spacing:.18em;text-transform:uppercase;font-weight:600;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.compare-row{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center;}
.compare-month{text-align:center;}
.cmo-name{font-size:11px;color:var(--muted);margin-bottom:4px;letter-spacing:.04em;}
.cmo-val{font-family:var(--fd);font-size:24px;font-weight:400;letter-spacing:-.02em;font-feature-settings:'lnum';}
.compare-arr{text-align:center;color:var(--muted);font-size:18px;}
.compare-delta{text-align:center;margin-top:12px;padding-top:12px;border-top:1px solid var(--line-soft);}
.compare-delta-val{font-family:var(--fd);font-size:22px;font-weight:400;letter-spacing:-.02em;}
.compare-delta-sub{font-size:12px;color:var(--muted);margin-top:2px;}
/* ── streak chips ── */
.streaks{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px;}
.streaks.two{grid-template-columns:1fr 1fr;}
.chip{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;overflow:hidden;}
.chip-val{font-family:var(--fd);font-size:30px;line-height:1;font-weight:400;letter-spacing:-.02em;font-feature-settings:'lnum';}
.chip-lbl{font-size:10px;color:var(--muted);margin-top:6px;letter-spacing:.05em;text-transform:uppercase;font-weight:500;line-height:1.3;}
.chip.locked{cursor:pointer;background:linear-gradient(135deg,var(--card) 0%,var(--accent-soft) 100%);}
.chip-qq{font-family:var(--fd);font-size:30px;line-height:1;font-weight:400;color:var(--accent);animation:pulse 2s ease-in-out infinite;}
/* ── post-upgrade ── */
.unlock-reveal{animation:pop .5s var(--eout);}
.unlock-badge{display:inline-flex;align-items:center;gap:4px;border-radius:5px;font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 7px;margin-left:6px;background-size:200% auto;background-image:linear-gradient(90deg,var(--gold) 0%,#E8D080 50%,var(--gold) 100%);color:#fff;animation:shimmer 2s linear infinite;}
/* ── buttons ── */
.actions-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.btn{padding:15px;border-radius:12px;font-size:14px;font-weight:500;display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .12s,background .2s,border-color .2s;letter-spacing:.01em;}
.btn:active{transform:scale(.97);}
.btn-p{background:var(--ink);color:var(--bg);}
.btn-p:hover{background:var(--ink-soft);}
.btn-s{background:transparent;color:var(--ink);border:1px solid var(--line);}
.btn-s:hover{border-color:var(--ink);}
.btn-a{background:var(--accent);color:#fff;font-weight:600;}
.btn-a:hover{filter:brightness(1.08);}
.btn-block{width:100%;}
.btn:disabled{background:var(--line);color:var(--muted);cursor:not-allowed;}
.text-link{color:var(--muted);font-size:13px;text-decoration:underline;text-underline-offset:4px;width:100%;text-align:center;padding:10px;}
.tl-accent{color:var(--accent);text-decoration:none;font-weight:500;font-size:14px;}
.tl-danger{color:var(--red);text-decoration:none;font-size:14px;display:flex;align-items:center;gap:8px;padding:10px 0;width:auto;}
.override-link{display:block;text-align:center;color:var(--muted);font-size:13px;text-decoration:underline;text-underline-offset:4px;padding:10px;width:100%;}
/* ── early day card ── */
.day-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px 18px;margin-bottom:16px;display:flex;align-items:flex-start;gap:13px;}
.day-icon{font-size:20px;flex-shrink:0;}
.day-title{font-size:14px;font-weight:600;margin-bottom:3px;}
.day-body{font-size:13px;color:var(--muted);line-height:1.45;}
/* ── forms ── */
.field{margin-bottom:18px;}
.lbl{display:block;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:9px;font-weight:600;}
.inp{width:100%;padding:14px 16px;background:var(--card);border:1px solid var(--line);border-radius:10px;font-size:15px;color:var(--ink);transition:border-color .2s;}
.inp:focus{border-color:var(--ink);}
.cw{position:relative;}
.cs{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:18px;font-family:var(--fd);pointer-events:none;}
.inp-c{padding-left:32px;font-size:18px;font-family:var(--fd);font-feature-settings:'lnum';}
textarea.inp{padding:14px 16px;font-size:14px;line-height:1.5;min-height:80px;resize:none;}
/* ── onboarding ── */
.ob-step{font-family:var(--fd);font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);margin-bottom:12px;}
.ob-title{font-family:var(--fd);font-weight:400;font-size:38px;line-height:1.06;margin:0 0 12px;letter-spacing:-.025em;color:var(--ink);}
.ob-title em{font-style:italic;color:var(--accent);}
.ob-sub{color:var(--muted);font-size:15px;line-height:1.55;margin:0 0 32px;}
.dots{display:flex;gap:6px;justify-content:center;margin-top:26px;}
.dot{width:6px;height:6px;border-radius:3px;background:var(--line);transition:all .4s var(--ease);}
.dot.active{width:24px;background:var(--accent);}
.ob-teaser{margin-top:26px;padding:18px;background:linear-gradient(135deg,var(--card) 0%,var(--accent-soft) 100%);border:1px solid var(--line);border-radius:16px;}
.ob-teaser-title{font-family:var(--fd);font-size:18px;font-weight:400;margin-bottom:4px;}
.ob-teaser-title em{font-style:italic;color:var(--accent);}
.ob-teaser-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;}
.ob-teaser-item{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px;}
.ob-teaser-item strong{display:block;font-size:13px;font-weight:500;color:var(--ink);margin-bottom:2px;}
.ob-teaser-item span{font-size:12px;color:var(--muted);}
/* ── cat chips ── */
.chip-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
.cat-chip{padding:7px 13px;font-size:13px;border-radius:999px;border:1px solid var(--line);color:var(--muted);background:transparent;transition:all .2s;}
.cat-chip:hover{border-color:var(--muted);}
.cat-chip.active{border-color:var(--ink);background:var(--ink);color:var(--bg);}
/* ── stats ── */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:20px;}
.stat-card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px;}
.stat-lbl{font-size:10px;color:var(--muted);letter-spacing:.08em;margin-bottom:7px;text-transform:uppercase;font-weight:600;}
.stat-val{font-family:var(--fd);font-size:24px;font-weight:400;letter-spacing:-.015em;font-feature-settings:'lnum';}
.sec-lbl{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin-top:30px;margin-bottom:16px;font-weight:600;display:flex;align-items:center;gap:8px;}
.sec-lbl::after{content:'';flex:1;height:1px;background:var(--line);}
.bar-chart{display:flex;align-items:flex-end;gap:8px;height:100px;}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;}
.bar-track{flex:1;width:100%;display:flex;align-items:flex-end;}
.bar{width:100%;background:var(--accent);border-radius:3px;min-height:3px;transition:height .5s var(--eout);}
.bar.empty{background:var(--line);min-height:2px;}
.bar-lbl{font-size:11px;color:var(--muted);font-weight:500;}
/* ── calendar heatmap ── */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:4px;}
.cal-dn{font-size:9px;color:var(--muted);text-align:center;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding-bottom:4px;}
.cal-day{aspect-ratio:1;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;color:var(--muted);}
.cal-day.cd-spend{cursor:pointer;}
.cal-day.cd-zero{background:var(--green-soft);color:var(--green);}
.cal-day.cd-low{background:rgba(181,118,20,0.12);color:var(--amber);}
.cal-day.cd-mid{background:rgba(194,65,12,0.14);color:var(--accent);}
.cal-day.cd-high{background:var(--red-soft);color:var(--red);}
.cal-day.cd-empty{background:transparent;}
.cal-day.cd-future{background:var(--line-soft);color:var(--line);}
.cal-legend{display:flex;align-items:center;gap:10px;margin-top:10px;font-size:11px;color:var(--muted);}
.cal-legend-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0;}
/* ── category rows ── */
.cat-row{margin-bottom:14px;}
.cat-row-head{display:flex;justify-content:space-between;margin-bottom:5px;font-size:14px;align-items:baseline;}
.cat-amt{color:var(--muted);font-family:var(--fd);font-size:13px;font-feature-settings:'lnum';}
.cat-bar-wrap{height:5px;background:var(--line);border-radius:3px;position:relative;}
.cat-bar-fill{height:100%;border-radius:3px;transition:width .5s var(--eout);}
.cat-fill-ok{background:var(--ink);}
.cat-fill-over{background:var(--red);}
.cat-marker{position:absolute;top:-3px;height:11px;width:2px;background:var(--muted);border-radius:1px;opacity:.5;}
/* ── transaction rows ── */
.tx-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--line-soft);cursor:pointer;transition:background .15s;}
.tx-row:last-child{border-bottom:none;}
.tx-row:hover{background:var(--card);margin:0 -4px;padding:12px 4px;}
.tx-left{flex:1;min-width:0;}
.tx-cat{font-size:14px;font-weight:500;}
.tx-date{font-size:12px;color:var(--muted);margin-top:2px;}
.tx-note{font-size:11px;color:var(--muted);margin-top:2px;font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;}
.tx-right{display:flex;align-items:center;gap:8px;padding-left:12px;flex-shrink:0;}
.tx-amt{font-family:var(--fd);font-size:17px;font-feature-settings:'lnum';}
.tx-edit-icon{color:var(--muted);opacity:.6;}
/* ── tx detail modal ── */
.tx-detail-amt{font-family:var(--fd);font-size:40px;font-weight:300;letter-spacing:-.03em;font-feature-settings:'lnum';text-align:center;margin-bottom:4px;}
.tx-detail-cat{text-align:center;font-size:14px;color:var(--muted);margin-bottom:20px;}
.tx-del-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;border-radius:12px;background:var(--red-soft);color:var(--red);font-size:14px;font-weight:500;margin-top:10px;transition:background .2s,color .2s;}
.tx-del-btn:hover{background:var(--red);color:#fff;}
/* ── settings ── */
.settings-section{margin-bottom:26px;}
.exp-row{display:flex;gap:8px;margin-bottom:10px;align-items:center;}
.exp-row .inp{flex:1;}
.exp-amt{width:90px;flex:0 0 auto;}
.danger-zone{margin-top:24px;padding-top:20px;border-top:1px solid var(--line);}
.catb-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line-soft);}
.catb-name{flex:1;font-size:14px;}
/* ── account card in settings ── */
.account-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:24px;}
.account-email{font-size:14px;font-weight:500;margin-bottom:4px;}
.account-sub{font-size:12px;color:var(--muted);}
.account-actions{display:flex;align-items:center;justify-content:space-between;margin-top:14px;padding-top:14px;border-top:1px solid var(--line-soft);}
/* ── theme toggle ── */
.theme-toggle{display:inline-flex;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:3px;}
.theme-toggle button{padding:6px 8px;border-radius:999px;color:var(--muted);transition:all .2s;display:flex;align-items:center;justify-content:center;}
.theme-toggle button.active{background:var(--ink);color:var(--bg);}
/* ── mode selector ── */
.mode-sel{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:4px;}
.mode-btn{padding:10px 8px;border-radius:7px;font-size:13px;font-weight:500;color:var(--muted);transition:all .2s;}
.mode-btn.active{background:var(--ink);color:var(--bg);}
/* ── premium ── */
.pm-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;background:linear-gradient(135deg,var(--gold),var(--accent));color:#fff;border-radius:999px;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;}
.pm-badge.outline{background:transparent;border:1px solid var(--gold);color:var(--gold);}
.lock-mini{display:inline-flex;align-items:center;gap:4px;color:var(--accent);font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;}
.pm-card{border-radius:16px;padding:20px;margin-bottom:22px;border:1px solid var(--line);}
.pm-card.inactive{background:linear-gradient(135deg,var(--card) 0%,var(--accent-soft) 100%);}
.pm-card-title{font-family:var(--fd);font-size:22px;font-weight:400;margin-bottom:4px;letter-spacing:-.01em;}
.pm-card-sub{font-size:13px;color:var(--muted);margin-bottom:14px;}
.pm-active-sub{font-size:13px;opacity:.72;margin-bottom:12px;color:inherit;}
.pm-active-link{font-size:12px;opacity:.6;color:inherit;text-decoration:underline;text-underline-offset:3px;cursor:pointer;padding:0;font-family:inherit;}
/* ── modal ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.52);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:100;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .28s var(--eout);}
.modal{background:var(--bg);border-radius:24px 24px 0 0;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;padding:28px 28px 36px;animation:slideUp .38s var(--eout);border-top:1px solid var(--line);position:relative;}
.modal-handle{width:36px;height:4px;background:var(--line);border-radius:2px;margin:-12px auto 20px;}
.modal-close{position:absolute;top:16px;right:16px;color:var(--muted);padding:8px;border-radius:8px;}
.modal-close:hover{color:var(--ink);background:var(--card);}

.pw-title em{font-style:italic;color:var(--accent);}

.feat-item:last-child{border-bottom:none;}

.feat-title{font-size:14px;font-weight:500;margin-bottom:2px;}
.feat-desc{font-size:12px;color:var(--muted);line-height:1.4;}
.plan-opts{display:grid;gap:10px;margin-bottom:16px;}
.plan-card{background:var(--card);border:1.5px solid var(--line);border-radius:14px;padding:16px 18px;cursor:pointer;transition:all .2s;position:relative;text-align:left;width:100%;display:block;}
.plan-card:hover{border-color:var(--muted);}
.plan-card.sel{border-color:var(--accent);background:var(--accent-soft);}
.plan-row{display:flex;justify-content:space-between;align-items:center;}
.plan-name{font-size:14px;font-weight:500;margin-bottom:3px;}
.plan-tag{font-size:12px;color:var(--muted);}
.plan-price{font-family:var(--fd);font-size:26px;font-weight:400;letter-spacing:-.02em;font-feature-settings:'lnum';}
.plan-per{font-size:12px;color:var(--muted);font-family:var(--fb);}
.plan-badge{position:absolute;top:-9px;right:16px;background:var(--accent);color:#fff;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:3px 8px;border-radius:4px;}
.pays-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:16px;padding:12px 14px;background:var(--accent-soft);border:1px solid var(--accent-mid);border-radius:10px;}
.pays-txt{font-size:13px;color:var(--accent);font-weight:500;line-height:1.4;}
.pw-disc{text-align:center;font-size:11px;color:var(--muted);margin-top:12px;line-height:1.5;}
/* ── misc ── */
.empty-state{color:var(--muted);font-size:14px;text-align:center;padding:24px 16px;}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px;}
.loading-screen .brand-mark{width:36px;height:36px;}
.loading-screen .loading-txt{color:var(--muted);font-size:12px;letter-spacing:.2em;text-transform:uppercase;}
.toast-el{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--bg);padding:10px 18px;border-radius:999px;font-size:13px;z-index:200;animation:scaleIn .28s var(--eout);box-shadow:var(--shadow-lg);white-space:nowrap;}

/* ── date helpers ── */
const pad   = n => String(n).padStart(2,"0");
const toLD  = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const today = () => toLD(new Date());
function parseDate(s) {
  if (!s) return new Date();
  const parts = String(s).slice(0,10).split("-").map(Number);
  // Validate: must be [YYYY, MM, DD] with real numbers
  if (parts.length < 3 || parts.some(isNaN) || parts[0] < 2000) return new Date();
  return new Date(parts[0], parts[1]-1, parts[2]);
}
const dim   = (d=new Date()) => new Date(d.getFullYear(),d.getMonth()+1,0).getDate();
const dleft = (d=new Date()) => dim(d)-d.getDate()+1;
const isThisMonth = s => { const d=parseDate(s),n=new Date(); return d.getFullYear()===n.getFullYear()&&d.getMonth()===n.getMonth(); };
const isInMo = (s,y,m) => { const d=parseDate(s); return d.getFullYear()===y&&d.getMonth()===m; };
const fmt      = n => `$${Number(n).toFixed(2)}`;
const fmtShort = n => Math.abs(n)>=1000?`$${(Math.abs(n)/1000).toFixed(1)}k`:`$${Math.abs(n).toFixed(0)}`;
const moName   = (d=new Date()) => d.toLocaleDateString(undefined,{month:"short"});
const esc      = s => String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

   SUPABASE DATA LAYER
   All DB operations are async and non-blocking.
   UI always updates optimistically from local S state first.
   ============================================================ */

/* ── Load all user data from Supabase after login ── */
async function dbLoadUserData(userId) {
  if (!DB_READY) return;
  try {
    syncStatus = "syncing"; updateSyncUI();

    // Fetch all three tables in parallel
    const [profRes, expRes, txRes] = await Promise.all([
      db.from("profiles").select("*").eq("id", userId).single(),
      db.from("fixed_expenses").select("*").eq("user_id", userId).order("sort_order"),
      db.from("transactions").select("*").eq("user_id", userId),
    ]);

    if (profRes.data) {
      const p = profRes.data;
      S.income       = Number(p.income)||0;
      S.savingsGoal  = Number(p.savings_goal)||0;
      S.zeroSens     = p.zero_sens||"balanced";
      S.recMode      = p.rec_mode||"normal";
      S.catBudgets   = p.cat_budgets||{};
      S.records      = p.records||{};
      S.premium      = !!p.premium;
      S.plan         = p.plan||null;
      S.theme        = p.theme||"auto";
    }

    if (expRes.data) {
      S.fixedExpenses = expRes.data.map(e => ({
        id: e.id, label: e.label, amount: Number(e.amount)||0,
      }));
    }

    if (txRes.data) {
      S.transactions = txRes.data.map(t => ({
        id:       t.id,
        amount:   Number(t.amount)||0,
        category: t.category||"Uncategorized",
        note:     t.note||"",
        date:     t.date,
      }));
    }

    // Mark as onboarded if they have income set
    if (S.income > 0) S.onboarded = true;

    saveLocal();
    syncStatus = "synced"; updateSyncUI();
  } catch(e) {
    console.error("dbLoad error", e);
    syncStatus = "error"; updateSyncUI();
  }
}

/* ── Upsert profile settings ── */
async function dbSaveProfile() {
  if (!DB_READY || !currentUser) return;
  try {
    await db.from("profiles").upsert({
      id:           currentUser.id,
      income:       S.income,
      savings_goal: S.savingsGoal,
      zero_sens:    S.zeroSens,
      rec_mode:     S.recMode,
      cat_budgets:  S.catBudgets,
      records:      S.records,
      premium:      S.premium,
      plan:         S.plan,
      theme:        S.theme,
    });
  } catch(e) { console.error("dbSaveProfile error", e); }
}

/* ── Sync fixed expenses (replace all) ── */
async function dbSaveFixedExpenses() {
  if (!DB_READY || !currentUser) return;
  try {
    // Delete existing, then insert fresh (simple & reliable for small arrays)
    await db.from("fixed_expenses").delete().eq("user_id", currentUser.id);
    if (S.fixedExpenses.length > 0) {
      await db.from("fixed_expenses").insert(
        S.fixedExpenses.map((e,i) => ({
          user_id:    currentUser.id,
          label:      e.label,
          amount:     e.amount,
          sort_order: i,
        }))
      );
    }
  } catch(e) { console.error("dbSaveExpenses error", e); }
}

/* ── Upsert a single transaction ── */
async function dbUpsertTransaction(tx) {
  if (!DB_READY || !currentUser) return;
  try {
    await db.from("transactions").upsert({
      id:       tx.id,
      user_id:  currentUser.id,
      amount:   tx.amount,
      category: tx.category,
      note:     tx.note||"",
      date:     tx.date,
    });
  } catch(e) { console.error("dbUpsertTx error", e); }
}

/* ── Delete a transaction ── */
async function dbDeleteTransaction(id) {
  if (!DB_READY || !currentUser) return;
  try {
    await db.from("transactions").delete().eq("id", id).eq("user_id", currentUser.id);
  } catch(e) { console.error("dbDeleteTx error", e); }
}

/* ── Full sync (used after settings save) ── */
async function dbFullSync() {
  if (!DB_READY || !currentUser) return;
  syncStatus = "syncing"; updateSyncUI();
  await Promise.all([dbSaveProfile(), dbSaveFixedExpenses()]);
  syncStatus = "synced"; updateSyncUI();
}

function updateSyncUI() {
  // Update sync dot in top bar without re-rendering everything
  document.querySelectorAll(".sync-dot").forEach(el => {
    el.className = "sync-dot " + syncStatus;
  });
  document.querySelectorAll(".sync-txt").forEach(el => {
    el.textContent = {synced:"Synced",syncing:"Syncing…",offline:"Offline",error:"Sync error"}[syncStatus]||"";
  });
}

let authTab   = "signin"; // "signin" | "signup"
let authError = "";
let authMsg   = "";

async function signIn(email, password) {
  authLoading=true; authError=""; authMsg=""; render();

  if (error) { authError = error.message; render(); return; }

async function signUp(email, password) {
  authLoading=true; authError=""; authMsg=""; render();
  const { data, error } = await db.auth.signUp({ email, password });
  authLoading = false;
  if (error) { authError = error.message; render(); return; }
  // Supabase sends a confirmation email by default
  authMsg = "Check your email to confirm your account, then sign in.";

  render();

async function forgotPassword(email) {
  if (!email) { authError="Enter your email first."; render(); return; }

    redirectTo: window.location.href,
  });
  authMsg = "Password reset email sent — check your inbox.";

async function signOut() {
  await db.auth.signOut();
  currentUser = null;
  S = {...DEF};

  syncStatus = "offline";

  authTab = "signin"; authError = ""; authMsg = "";

async function onSignIn(user) {
  currentUser = user;

}

  render();
}

/* ============================================================
   LOCAL PERSISTENCE (cache + guest fallback)
   ============================================================ */
function saveLocal() {
  try { localStorage.setItem(LSK, JSON.stringify(S)); } catch(e) {}
}
function loadLocal() {
  try {
    const raw = localStorage.getItem(LSK);
    if (raw) S = { ...DEF, ...JSON.parse(raw) };
  } catch(e) {}
  if (!S.records)         S.records = {};
  if (!S.catBudgets)      S.catBudgets = {};
  if (!S.missedDismissed) S.missedDismissed = {};
  // Prune old overrides
  const pfx = `${new Date().getFullYear()}-${pad(new Date().getMonth()+1)}`;
  Object.keys(S.overrides||{}).forEach(k => { if (!k.startsWith(pfx)) delete S.overrides[k]; });
}

/* ── Master save: always local, async DB sync if logged in ── */
function save(opts={}) {
  saveLocal();
  if (!DB_READY || !currentUser) return;
  syncStatus = "syncing"; updateSyncUI();
  const tasks = [];
  if (opts.profile !== false)  tasks.push(dbSaveProfile());
  if (opts.expenses)           tasks.push(dbSaveFixedExpenses());
  if (opts.tx)                 tasks.push(dbUpsertTransaction(opts.tx));
  if (opts.deleteTx)           tasks.push(dbDeleteTransaction(opts.deleteTx));
  if (!tasks.length)           tasks.push(dbSaveProfile());
  Promise.all(tasks)
    .then(() => { syncStatus="synced"; updateSyncUI(); })
    .catch(() => { syncStatus="error"; updateSyncUI(); });
}

/* ============================================================
   BUSINESS LOGIC (unchanged from v5)
   ============================================================ */
function computeRec() {
  const ft   = S.fixedExpenses.reduce((s,e)=>s+Number(e.amount||0),0);
  const disc = Math.max(0,S.income-ft-S.savingsGoal);
  const mTx  = S.transactions.filter(t=>isThisMonth(t.date));
  const spent= mTx.reduce((s,t)=>s+Number(t.amount),0);
  const rem  = disc-spent;
  const dl   = dleft();
  const base = dl>0?rem/dl:0;
  const last3 =sumLastN(mTx,3);
  const exp3  =(disc/dim())*3;
  const overT =exp3>0&&last3>exp3*1.3;
  const mProg =new Date().getDate()/dim();
  const sProg =disc>0?spent/disc:0;
  const behind=sProg>mProg+0.1;
  const zM=S.premium?({low:.6,balanced:1,strict:1.4}[S.zeroSens]||1):1;
  const mM=S.premium?({conservative:.8,normal:1,flexible:1.15}[S.recMode]||1):1;
  let status="safe",reason="",daily=Math.max(0,base*mM);
  if(rem<=0)                            {daily=0;status="zero";     reason="You're at your monthly limit.";}
  else if(overT&&rem<disc*(0.2*zM))     {daily=0;status="zero";     reason="Recent overspending + low remaining budget.";}
  else if(overT)                        {daily=base*.6*mM;status="caution";  reason="You've been spending heavily lately.";}
  else if(behind)                       {daily=base*.75*mM;status="caution"; reason="Slightly ahead of pace — pulling back helps.";}
  else if(dl<=3&&rem<base*dl*(.5*zM))   {daily=0;status="zero";     reason="End of month — protect what's left.";}
  else                                  {status="safe";              reason="You're on track. Spend with intention.";}
  if(status==="safe"&&sProg>.85){status="high-risk";reason="You've used most of this month's budget.";daily=Math.min(daily,base*.5);}
  return{daily:Math.round(daily*100)/100,status,reason,disc,spent,rem:Math.max(0,rem),daysLeft:dl,sProg:Math.min(1,sProg),base};
}
function sumLastN(txs,n){const cut=new Date();cut.setDate(cut.getDate()-n);return txs.filter(t=>parseDate(t.date)>=cut).reduce((s,t)=>s+Number(t.amount),0);}
function computeStreaks(){
  const mTx=S.transactions.filter(t=>isThisMonth(t.date));
  const byDay={};
  mTx.forEach(t=>{const k=t.date.slice(0,10);byDay[k]=(byDay[k]||0)+Number(t.amount);});
  const now=new Date();
  const ft=S.fixedExpenses.reduce((s,e)=>s+Number(e.amount||0),0);
  const bDay=S.income>0?(S.income-ft-S.savingsGoal)/dim():0;
  let zeroStr=0,safeStr=0,totalZero=0;
  for(let i=0;i<now.getDate();i++){const d=new Date(now);d.setDate(now.getDate()-i);const k=toLD(d);const sp=byDay[k]||0;if(i===0||zeroStr===i){if(sp===0)zeroStr++;}if(i===0||safeStr===i){if(sp<=bDay)safeStr++;}if(sp===0)totalZero++;}
  const rec=computeRec();
  const disc=Math.round(Math.min(100,(safeStr/Math.max(1,now.getDate()))*100)*.35+Math.min(100,(totalZero/Math.max(1,now.getDate()))*200)*.25+Math.max(0,(1-rec.sProg)*100)*.40);
  return{zeroStr,safeStr,totalZero,disc};
}
function generateInsight(rec){
  const mTx=S.transactions.filter(t=>isThisMonth(t.date));
  if(!mTx.length)return"A clean slate. The first decision sets the tone.";
  let we=0,wd=0,wec=0,wdc=0;
  mTx.forEach(t=>{const day=parseDate(t.date).getDay();if(day===0||day===6){we+=Number(t.amount);wec++;}else{wd+=Number(t.amount);wdc++;}});
  if(wec>=2&&wdc>0&&(we/wec)>(wd/wdc)*1.5){const p=Math.round(((we/wec)-(wd/wdc))/(wd/wdc)*100);return`You spend ${p}% more on weekends than weekdays.`;}
  const dT=new Date().getDate();const proj=dT>0?(rec.spent/dT)*dim():0;const sv=rec.disc-proj;
  if(sv>50)return`At this pace, you'll finish ${moName()} with ${fmt(sv)} unspent.`;
  if(sv<-50)return`At this pace, you'll exceed your budget by ${fmt(-sv)} this month.`;
  const st=computeStreaks();
  if(st.totalZero>=2)return`${st.totalZero} zero-spend days this month — that's real progress.`;
  return"Steady spending. Small choices compound over time.";
}
function getMissedDay(){
  const yest=new Date();yest.setDate(yest.getDate()-1);const k=toLD(yest);
  if(!S.transactions.length)return null;
  if((S.missedDismissed||{})[k])return null;
  if(S.transactions.some(t=>t.date.slice(0,10)===k))return null;
  if(!isThisMonth(k))return null;
  return k;
}
function computeProjection(rec){
  const dT=new Date().getDate();const proj=dT>0?(rec.spent/dT)*dim():0;const delta=rec.disc-proj;
  const status=delta>=50?"ok":delta>=-30?"warn":"over";
  const mTx=S.transactions.filter(t=>isThisMonth(t.date));const byCat={};
  mTx.forEach(t=>{byCat[t.category]=(byCat[t.category]||0)+Number(t.amount);});
  const catProj=Object.entries(byCat).map(([cat,sp])=>{const pC=dT>0?(sp/dT)*dim():0;const bud=S.catBudgets[cat]||0;return{cat,sp,pCat:pC,budget:bud,over:bud>0&&pC>bud};}).sort((a,b)=>b.pCat-a.pCat).slice(0,3);
  return{proj,delta,status,catProj};
}
function monthSpend(off){const d=new Date();d.setMonth(d.getMonth()+off);const y=d.getFullYear(),m=d.getMonth();return S.transactions.filter(t=>isInMo(t.date,y,m)).reduce((s,t)=>s+Number(t.amount),0);}
function computeSavings(rec){if(!S.savingsGoal)return null;const oT=Math.min(S.savingsGoal,rec.rem);const pct=Math.min(1,oT/S.savingsGoal);return{target:S.savingsGoal,onTrack:oT,pct,met:pct>=1};}
function todaySpend(){const k=today();return S.transactions.filter(t=>t.date.slice(0,10)===k).reduce((s,t)=>s+Number(t.amount),0);}
function daysActive(){return new Set(S.transactions.map(t=>t.date.slice(0,10))).size;}
function shouldShowNudge(){if(S.premium||S.nudgeDismissed)return false;const rec=computeRec();return(rec.status==="caution"||rec.status==="high-risk")&&daysActive()>=3;}
function checkRecords(){
  if(!S.premium)return;
  if(new Date().getDate()!==1)return;
  const prev=new Date();prev.setMonth(prev.getMonth()-1);
  const prevSpend=monthSpend(-1);
  const ft=S.fixedExpenses.reduce((s,e)=>s+Number(e.amount||0),0);
  const disc=Math.max(0,S.income-ft-S.savingsGoal);
  const under=disc-prevSpend;
  if(under>0&&under>(S.records.bestMonth?.amount||0)){S.records.bestMonth={amount:under,date:toLD(prev),month:moName(prev)};save();}
}
function recordCard(){
  if(!S.premium||!S.records.bestMonth)return"";
  if(new Date().getDate()>3)return"";
  const r=S.records.bestMonth;
  return`<div class="record-card"><div class="record-eye">${I.trophy} Personal Record</div><div class="record-title">Best month yet — ${fmt(r.amount)} under budget</div><div class="record-sub">Last ${r.month} · Keep it going</div></div>`;
}

function openModal(html){modal=html;renderModal();}

function renderModal(){
  const r=document.getElementById("modal-root");
  if(!modal){r.innerHTML="";return;}
  r.innerHTML=`<div class="modal-bg" id="mbg"><div class="modal" onclick="event.stopPropagation()"><div class="modal-handle"></div><button class="modal-close icon-btn" id="mcl">${I.close}</button>${modal}</div></div>`;

function wireModal(){
  document.querySelectorAll(".plan-card").forEach(c=>{c.onclick=()=>{selPlan=c.dataset.plan;modal=buildPaywall();renderModal();};});
  const sub=document.getElementById("pw-sub");
  if(sub)sub.onclick=()=>{S.premium=true;S.plan=selPlan;S.premiumSince=today();S.justUpgraded=true;save();closeModal();toast("✦ Welcome to SpendWise Plus");render();setTimeout(()=>{S.justUpgraded=false;save();},4000);};
  const txSave=document.getElementById("tx-save");
  if(txSave)txSave.onclick=()=>{
    const id=Number(txSave.dataset.id);
    const amt=Math.max(0,Number(document.getElementById("tx-ea")?.value||0));
    if(!amt){toast("Amount must be greater than $0");return;}
    const cat=document.getElementById("tx-ec")?.value||"Uncategorized";
    const note=document.getElementById("tx-en")?.value||"";
    const date=document.getElementById("tx-ed")?.value||today();
    const updated={id,amount:amt,category:cat,note,date};
    S.transactions=S.transactions.map(t=>t.id===id?updated:t);
    save({tx:updated});closeModal();toast("Expense updated");render();
  };
  const txDel=document.getElementById("tx-del");
  if(txDel)txDel.onclick=()=>{
    const id=Number(txDel.dataset.id);
    S.transactions=S.transactions.filter(t=>t.id!==id);
    save({deleteTx:id});closeModal();toast("Expense removed");render();
  };
}

function calcMinOff(){
  if(!S.transactions.length)return -12;
  const times=S.transactions.map(t=>parseDate(t.date).getTime()).filter(t=>!isNaN(t));
  if(!times.length)return -12;
  const earliest=new Date(Math.min(...times));
  const n=new Date();
  return Math.min(0,(earliest.getFullYear()-n.getFullYear())*12+(earliest.getMonth()-n.getMonth()));
}
function renderStats(){
  const minOff=calcMinOff();if(statsOff<minOff)statsOff=minOff;
  const off=S.premium?statsOff:0;
  const td=new Date();td.setMonth(td.getMonth()+off);
  const ty=td.getFullYear(),tm=td.getMonth(),isCur=off===0;
  const mLbl=td.toLocaleDateString(undefined,{month:"long",year:"numeric"});
  const mTx=S.transactions.filter(t=>isInMo(t.date,ty,tm));
  const ft=S.fixedExpenses.reduce((s,e)=>s+Number(e.amount||0),0);
  const disc=Math.max(0,S.income-ft-S.savingsGoal);
  const spent=mTx.reduce((s,t)=>s+Number(t.amount),0);
  const rem=Math.max(0,disc-spent);
  const dCnt=isCur?new Date().getDate():dim(td);
  const avg=dCnt>0?spent/dCnt:0;
  const dl=isCur?dleft():0;
  let chartHtml="";
  if(isCur){const last7=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);const k=toLD(d);const tot=S.transactions.filter(t=>t.date.slice(0,10)===k).reduce((s,t)=>s+Number(t.amount),0);last7.push({day:d.toLocaleDateString(undefined,{weekday:"short"})[0],tot});}const mx=Math.max(...last7.map(d=>d.tot),1);chartHtml=`<div class="sec-lbl">Last 7 Days</div><div class="bar-chart">${last7.map(d=>`<div class="bar-col"><div class="bar-track"><div class="bar ${d.tot===0?"empty":""}" style="height:${(d.tot/mx)*100}%"></div></div><div class="bar-lbl">${d.day}</div></div>`).join("")}</div>`;}
  let calHtml="";
  if(S.premium&&isCur){const now=new Date(),y=now.getFullYear(),m=now.getMonth();const firstDow=new Date(y,m,1).getDay();const totalDays=dim(now);const byDay={};mTx.forEach(t=>{const k=t.date.slice(0,10);byDay[k]=(byDay[k]||0)+Number(t.amount);});const amounts=Object.values(byDay).filter(v=>v>0);const maxAmt=amounts.length?Math.max(...amounts):1;let cells=["S","M","T","W","T","F","S"].map(d=>`<div class="cal-dn">${d}</div>`).join("");for(let i=0;i<firstDow;i++)cells+=`<div class="cal-day cd-empty"></div>`;for(let d=1;d<=totalDays;d++){const k=`${y}-${pad(m+1)}-${pad(d)}`;const amt=byDay[k]||0;const fut=d>now.getDate();let cls="cal-day";if(fut)cls+=" cd-future";else if(!amt)cls+=" cd-zero cd-spend";else if(amt<maxAmt*.25)cls+=" cd-low cd-spend";else if(amt<maxAmt*.6)cls+=" cd-mid cd-spend";else cls+=" cd-high cd-spend";cells+=`<div class="${cls}" data-day="${k}">${d}</div>`;}calHtml=`<div class="sec-lbl">Month Heatmap</div><div class="cal-grid">${cells}</div><div class="cal-legend"><div class="cal-legend-dot" style="background:var(--green-soft)"></div><span>Zero</span><div class="cal-legend-dot" style="background:rgba(181,118,20,0.18)"></div><span>Low</span><div class="cal-legend-dot" style="background:rgba(194,65,12,0.2)"></div><span>Mid</span><div class="cal-legend-dot" style="background:var(--red-soft)"></div><span>High</span></div>`;}
  else if(!S.premium&&isCur){calHtml=`<div class="sec-lbl">Month Heatmap <span class="lock-mini" style="margin-left:4px">${I.lock} Plus</span></div><div class="insight-card locked" id="unlock-cal" style="margin-bottom:0;cursor:pointer"><div class="insight-lbl">${I.lock} Calendar heatmap</div><div class="insight-txt">See every day coloured by spending level.</div><div class="insight-overlay"><button class="btn btn-a" style="padding:8px 16px;font-size:13px">${I.star} Unlock with Plus</button></div></div>`;}
  const byCat={};mTx.forEach(t=>{byCat[t.category]=(byCat[t.category]||0)+Number(t.amount);});const cats=Object.entries(byCat).sort((a,b)=>b[1]-a[1]);
  const catsHtml=S.premium?`<div class="sec-lbl">${I.bulb} By Category</div>${cats.length===0?`<div class="empty-state">No expenses logged.</div>`:cats.map(([cat,amt])=>{const pct=spent>0?(amt/spent)*100:0;const budget=S.catBudgets[cat]||0;const bPct=budget>0?Math.min(100,(amt/budget)*100):0;const over=budget>0&&amt>budget;const mPos=budget>0?Math.min(100,(budget/Math.max(amt,budget))*100):0;return`<div class="cat-row"><div class="cat-row-head"><span>${esc(cat)}</span><span class="cat-amt">${budget>0?fmt(amt)+" / "+fmt(budget):fmt(amt)+" · "+pct.toFixed(0)+"%"}</span></div><div class="cat-bar-wrap"><div class="cat-bar-fill ${over?"cat-fill-over":"cat-fill-ok"}" style="width:${budget>0?bPct:pct}%;height:5px"></div>${budget>0?`<div class="cat-marker" style="left:${mPos}%"></div>`:""}</div></div>`;}).join("")}`:`<div class="sec-lbl">By Category <span class="lock-mini" style="margin-left:4px">${I.lock} Plus</span></div><div class="insight-card locked" id="unlock-cats" style="margin-bottom:0;cursor:pointer"><div class="insight-lbl">${I.lock} Category breakdown</div><div class="insight-txt">See exactly where your money goes, broken down by category.</div><div class="insight-overlay"><button class="btn btn-a" style="padding:8px 16px;font-size:13px">${I.star} Unlock with Plus</button></div></div>`;
  const recentHtml=mTx.length===0?`<div class="empty-state">No expenses logged this month.</div>`:mTx.slice().reverse().slice(0,15).map(t=>`<div class="tx-row" data-txid="${t.id}"><div class="tx-left"><div class="tx-cat">${esc(t.category)}</div><div class="tx-date">${parseDate(t.date).toLocaleDateString(undefined,{month:"short",day:"numeric"})}</div>${(t.note||"")?`<div class="tx-note">${esc(t.note)}</div>`:""}</div><div class="tx-right"><div class="tx-amt">${fmt(t.amount)}</div><div class="tx-edit-icon">${I.edit}</div></div></div>`).join("");
  const exportBtn=S.premium?`<div style="margin-top:24px"><button class="btn btn-s btn-block" id="export-btn">${I.dl} Export ${mLbl} as CSV</button></div>`:"";
  const atMin=off<=minOff;
  return`<div class="screen"><div class="sub-header"><button class="icon-btn" id="back-btn" style="margin-left:-8px;color:var(--ink)">${I.back}</button><h2>Stats</h2>${S.premium?`<span class="pm-badge outline" style="margin-left:auto">Plus</span>`:""}</div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-top:20px;padding:13px 16px;background:var(--card);border:1px solid var(--line);border-radius:12px"><button class="icon-btn" id="mo-prev" ${atMin?"disabled":""} style="${atMin?"opacity:.3":""}">${S.premium?I.back:I.lock}</button><div style="font-family:var(--fd);font-size:18px;letter-spacing:-.01em">${mLbl}</div><button class="icon-btn" id="mo-next" ${off>=0?"disabled":""} style="${off>=0?"opacity:.3":""}"><span style="transform:scaleX(-1);display:inline-block">${I.back}</span></button></div>
  <div class="stat-grid"><div class="stat-card"><div class="stat-lbl">Spent</div><div class="stat-val">${fmt(spent)}</div></div><div class="stat-card"><div class="stat-lbl">Remaining</div><div class="stat-val">${fmt(rem)}</div></div><div class="stat-card"><div class="stat-lbl">Avg / day</div><div class="stat-val">${fmt(avg)}</div></div><div class="stat-card"><div class="stat-lbl">${isCur?"Days left":"Days total"}</div><div class="stat-val">${isCur?dl:dCnt}</div></div></div>
  ${chartHtml}${calHtml}${catsHtml}
  <div class="sec-lbl">Recent <span style="font-size:11px;color:var(--muted);text-transform:none;letter-spacing:0;font-weight:400">· tap to edit</span></div>${recentHtml}${exportBtn}</div>`;
}
function wireStats(){
  document.getElementById("back-btn").onclick=()=>{statsOff=0;nav("home");};
  document.getElementById("mo-prev").onclick=()=>{if(!S.premium){openPaywall("history");return;}statsOff--;render();};
  const nx=document.getElementById("mo-next");if(nx&&statsOff<0)nx.onclick=()=>{statsOff++;render();};
  const uc=document.getElementById("unlock-cats");if(uc)uc.onclick=()=>openPaywall("insights");
  const ucal=document.getElementById("unlock-cal");if(ucal)ucal.onclick=()=>openPaywall("insights");
  const ex=document.getElementById("export-btn");if(ex)ex.onclick=()=>exportCSV(statsOff);
  document.querySelectorAll(".tx-row[data-txid]").forEach(row=>{row.onclick=()=>{const id=Number(row.dataset.txid);const tx=S.transactions.find(t=>t.id===id);if(tx)openTxModal(tx);};});
  document.querySelectorAll(".cal-day.cd-spend").forEach(d=>{d.onclick=()=>{const k=d.dataset.day;const dayT=S.transactions.filter(t=>t.date.slice(0,10)===k);if(!dayT.length)return;const tot=dayT.reduce((s,t)=>s+Number(t.amount),0);toast(`${parseDate(k).toLocaleDateString(undefined,{month:"short",day:"numeric"})}: ${fmt(tot)} · ${dayT.length} expense${dayT.length>1?"s":""}`);};});
}
function exportCSV(off=0){
  const td=new Date();td.setMonth(td.getMonth()+off);const ty=td.getFullYear(),tm=td.getMonth();
  const mTx=S.transactions.filter(t=>isInMo(t.date,ty,tm));
  if(!mTx.length){toast("Nothing to export for this month");return;}
  const rows=[["Date","Amount","Category","Note"],...mTx.map(t=>[t.date.slice(0,10),Number(t.amount).toFixed(2),t.category,t.note||""])];
  const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
  const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
  a.download=`spendwise-${td.getFullYear()}-${pad(td.getMonth()+1)}.csv`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);toast("Exported ✓");
}

  const catBSection=isPrem?`<div class="settings-section"><div class="sec-lbl">${I.target} Category Budgets</div><div style="font-size:12px;color:var(--muted);margin-bottom:12px">Set a monthly limit per category. Leave blank for no limit.</div>${knownCats.slice(0,8).map(cat=>`<div class="catb-row"><div class="catb-name">${esc(cat)}</div><div class="cw" style="width:100px"><span class="cs" style="font-size:14px">$</span><input type="number" min="0" class="inp cat-budget-inp" style="padding:10px 10px 10px 26px;font-size:14px;width:100px" data-cat="${esc(cat)}" value="${S.catBudgets[cat]||""}" placeholder="—"/></div></div>`).join("")}</div>`:`<div class="settings-section"><div class="sec-lbl">${I.target} Category Budgets <span class="lock-mini" style="margin-left:4px">${I.lock} Plus</span></div><div class="insight-card locked" id="unlock-catb" style="margin-bottom:0;cursor:pointer"><div class="insight-lbl">${I.lock} Per-category limits</div><div class="insight-txt">Set limits for Food, Fun, Transport — alerts when you're close.</div><div class="insight-overlay"><button class="btn btn-a" style="padding:8px 16px;font-size:13px">${I.star} Unlock with Plus</button></div></div></div>`;
  const ctrlSection=isPrem?`<div class="settings-section"><div class="sec-lbl">${I.sliders} Smart Controls</div><div class="field"><label class="lbl">Recommendation mode</label><div class="mode-sel">${[["conservative","Conservative"],["normal","Normal"],["flexible","Flexible"]].map(([v,l])=>`<button class="mode-btn ${S.recMode===v?"active":""}" data-rm="${v}">${l}</button>`).join("")}</div><div style="font-size:12px;color:var(--muted);margin-top:8px;line-height:1.45">${{conservative:"Lower daily limits — for when you tend to overspend.",normal:"Balanced — what most people use.",flexible:"More breathing room — higher daily limits."}[S.recMode]}</div></div><div class="field"><label class="lbl">Zero-spend sensitivity</label><div class="mode-sel">${[["low","Low"],["balanced","Balanced"],["strict","Strict"]].map(([v,l])=>`<button class="mode-btn ${S.zeroSens===v?"active":""}" data-zs="${v}">${l}</button>`).join("")}</div><div style="font-size:12px;color:var(--muted);margin-top:8px;line-height:1.45">${{low:"Rarely triggers zero-spend days.",balanced:"Triggers when budget gets tight.",strict:"More aggressive — triggers earlier."}[S.zeroSens]}</div></div></div>`:`<div class="settings-section"><div class="sec-lbl">${I.sliders} Smart Controls <span class="lock-mini" style="margin-left:4px">${I.lock} Plus</span></div><div class="insight-card locked" id="unlock-ctrl" style="margin-bottom:0;cursor:pointer"><div class="insight-lbl">${I.lock} Sensitivity &amp; mode controls</div><div class="insight-txt">Tune how aggressively SpendWise protects your budget.</div><div class="insight-overlay"><button class="btn btn-a" style="padding:8px 16px;font-size:13px">${I.star} Unlock with Plus</button></div></div></div>`;

    <div class="field"><label class="lbl">Fixed expenses</label><div id="s-exp-list">${setD.expenses.map((e,i)=>`<div class="exp-row"><input type="text" class="inp s-el" data-i="${i}" value="${esc(e.label)}" placeholder="Label"/><input type="number" min="0" class="inp exp-amt s-ea" data-i="${i}" value="${e.amount}" placeholder="0"/><button class="icon-btn s-del" data-i="${i}" style="color:var(--muted)">${I.trash}</button></div>`).join("")}</div><button class="tl-accent" id="s-add" style="padding:8px 0">+ Add expense</button></div>

    <button class="btn btn-p btn-block" id="s-save" style="margin-top:20px">${setD.flash?I.check+" Saved":"Save changes"}</button>

function wireSettings(){

  const so=document.getElementById("sign-out-btn");if(so)so.onclick=()=>signOut();
  const si=document.getElementById("sign-in-btn");if(si)si.onclick=()=>{screen="auth";authTab="signin";authError="";authMsg="";render();};

/* ── dispatcher ── */
function wireHandlers(){
  if     (screen==="auth")        wireAuth();
  else if(screen==="onboarding")  wireOB();
  else if(screen==="home")        wireHome();
  else if(screen==="add")         wireAdd();

/* ============================================================
   BOOT
   ============================================================ */
async function boot() {
  applyTheme();

  if (!DB_READY) {
    // No Supabase configured — run purely local
    loadLocal();
    checkRecords();
    screen = S.onboarded ? "home" : "onboarding";
    render();
    return;
  }

  // Check for existing Supabase session
  const { data: { session } } = await db.auth.getSession();

  if (session?.user) {
    // Returning user with valid session
    currentUser = session.user;
    loadLocal(); // show cached data immediately
    render();    // paint the screen
    // Then load fresh data from DB in background
    await dbLoadUserData(session.user.id);
    checkRecords();
    screen = S.onboarded ? "home" : "onboarding";
    render();
  } else {
    // No session — check for local guest data
    loadLocal();
    if (S.onboarded) {
      // Guest with existing local data — go straight to app
      screen = "home";
    } else {
      // Fresh user — show auth
      screen = "auth";
    }
    render();
  }

  // Listen for auth state changes (e.g. email confirmation in another tab)
  // bootDone flag prevents this from firing during initial session restore
  let bootDone = false;
  db.auth.onAuthStateChange(async (event, session) => {
    if (!bootDone) return; // ignore events during boot
    if (event === "SIGNED_IN" && session?.user && session.user.id !== currentUser?.id) {
      currentUser = session.user;
      await dbLoadUserData(session.user.id);
      checkRecords();
      screen = S.onboarded ? "home" : "onboarding";
      render();
    } else if (event === "SIGNED_OUT") {
      currentUser = null;
      S = {...DEF};
      saveLocal();
      syncStatus = "offline";
      screen = "auth";
      authTab = "signin"; authError = ""; authMsg = "";
      render();
    }
  });
  bootDone = true;
}

boot();
